<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Login - Agricultural Economic Center</title>
    <link rel="stylesheet" href="css/buyer-styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-form">
            <h2>🌱 Buyer Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn-primary">Login to Account</button>
            </form>
            <div class="auth-links">
                <p><a href="forgot-password.html">Forgot Password?</a></p>
                <p>Don't have an account? <a href="buyer-register.html">Create Account</a></p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
<script>
    // Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyAJBaIq9oElhG0iMbAos0TiWwUQLiADg7g",
        authDomain: "goviconnect-105c9.firebaseapp.com",
        projectId: "goviconnect-105c9",
        storageBucket: "goviconnect-105c9.firebasestorage.app",
        messagingSenderId: "173017898873",
        appId: "1:173017898873:web:eb3ad5936aabe5cbc119a8"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    console.log('Firebase initialized for buyer login');

    // Check if user is already logged in and is a buyer
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            console.log('User already logged in, checking user type...');
            
            // Check if user is a buyer
            const buyerDoc = await db.collection('buyers').doc(user.uid).get();
            const userDoc = await db.collection('users').doc(user.uid).get();
            
            if (buyerDoc.exists || (userDoc.exists && userDoc.data().userType === "buyer")) {
                console.log('User is a buyer, redirecting to buyer dashboard');
                window.location.href = "buyer-dashboard.html";
            } else {
                console.log('User is not a buyer, signing out...');
                await auth.signOut();
            }
        }
    });

    // Buyer login form handler
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const loginBtn = e.target.querySelector('.btn-primary');

        try {
            loginBtn.textContent = 'Logging in...';
            loginBtn.disabled = true;

            console.log('Attempting buyer login for:', email);
            
            // Login with Firebase
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            const user = userCredential.user;
            
            console.log('Login successful, checking user type...');
            
            // Check if user is a buyer
            const buyerDoc = await db.collection('buyers').doc(user.uid).get();
            const userDoc = await db.collection('users').doc(user.uid).get();
            
            if (buyerDoc.exists || (userDoc.exists && userDoc.data().userType === "buyer")) {
                console.log('User is a buyer, redirecting to dashboard');
                alert('Login successful! Welcome back!');
                window.location.href = "buyer-dashboard.html";
            } else {
                // User is not a buyer, sign them out
                await auth.signOut();
                alert('This account is not registered as a buyer. Please use the farmer login or create a buyer account.');
            }

        } catch (error) {
            console.error('Login error:', error);
            
            let errorMessage = "Login failed: ";
            switch (error.code) {
                case 'auth/user-not-found':
                    errorMessage += "No account found with this email.";
                    break;
                case 'auth/wrong-password':
                    errorMessage += "Incorrect password.";
                    break;
                case 'auth/invalid-email':
                    errorMessage += "Invalid email address.";
                    break;
                default:
                    errorMessage += error.message;
            }
            
            alert(errorMessage);
        } finally {
            loginBtn.textContent = 'Login to Account';
            loginBtn.disabled = false;
        }
    });
</script>
</body>
</html>
