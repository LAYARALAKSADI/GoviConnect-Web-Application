<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Agricultural Economic Center</title>
    <link rel="stylesheet" href="css/buyer-styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-form">
            <h2>🔐 Reset Password</h2>
            <p style="text-align: center; margin-bottom: 20px; color: #666;">
                Enter your email address and we'll send you a password reset link.
            </p>
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="Enter your registered email">
                </div>
                <button type="submit" class="btn-primary">Send Reset Link</button>
            </form>
            <div class="auth-links">
                <p>Remember your password? <a href="buyer-login.html">Back to Login</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="js/forgot-password.js"></script>
</body>
</html>
