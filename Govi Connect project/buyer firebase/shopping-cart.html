<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="css/buyer-styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Shopping Cart</h1>
            <div class="header-actions">
                <a href="products-browse.html" class="btn-secondary">Continue Shopping</a>
            </div>
        </header>

        <div id="cartItems" class="cart-items">
            <!-- Cart items will be loaded here -->
        </div>

        <div class="cart-summary">
            <h3>Order Summary</h3>
            <div class="summary-details">
                <p>Total Items: <span id="totalItems">0</span></p>
                <p>Total Amount: Rs. <span id="totalAmount">0.00</span></p>
            </div>
            <button onclick="placeOrder()" class="btn-primary" id="placeOrderBtn">Place Order</button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAJBaIq9oElhG0iMbAos0TiWwUQLiADg7g",
            authDomain: "goviconnect-105c9.firebasestorage.app",
            projectId: "goviconnect-105c9",
            storageBucket: "goviconnect-105c9.firebasestorage.app",
            messagingSenderId: "173017898873",
            appId: "1:173017898873:web:eb3ad5936aabe5cbc119a8"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let cart = JSON.parse(localStorage.getItem('buyerCart')) || [];
          // Add this to every buyer page - USER TYPE PROTECTION
          // Add this to every buyer page - USER TYPE PROTECTION
auth.onAuthStateChanged(async (user) => {
    if (user) {
        // Check if user is actually a buyer
        try {
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (userDoc.exists) {
                const userData = userDoc.data();
                if (userData.userType !== "buyer") {
                    // Redirect to appropriate portal
                    if (userData.userType === "farmer") {
                        window.location.href = 'farmer-dashboard.html';
                    } else {
                        await auth.signOut();
                        window.location.href = 'buyer-login.html';
                    }
                }
                // User is buyer, continue loading page
            } else {
                // No user document, redirect to login
                await auth.signOut();
                window.location.href = 'buyer-login.html';
            }
        } catch (error) {
            console.error('Error checking user type:', error);
            window.location.href = 'buyer-login.html';
        }
    } else {
        // No user logged in, redirect to login
        window.location.href = 'buyer-login.html';
    }
});

        // Check authentication
        auth.onAuthStateChanged((user) => {
            if (user) {
                displayCart();
            } else {
                window.location.href = 'buyer-login.html';
            }
        });

        // Display cart items
        function displayCart() {
            const cartContainer = document.getElementById('cartItems');
            const totalItemsEl = document.getElementById('totalItems');
            const totalAmountEl = document.getElementById('totalAmount');
            const placeOrderBtn = document.getElementById('placeOrderBtn');
            
            if (cart.length === 0) {
                cartContainer.innerHTML = '<p class="empty-cart">Your cart is empty</p>';
                totalItemsEl.textContent = '0';
                totalAmountEl.textContent = '0.00';
                placeOrderBtn.disabled = true;
                return;
            }

            let totalItems = 0;
            let totalAmount = 0;

            cartContainer.innerHTML = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                totalItems += item.quantity;
                totalAmount += itemTotal;

                return `
                    <div class="cart-item">
                        <img src="${item.imageUrl || 'images/placeholder.jpg'}" 
                             alt="${item.name}" 
                             onerror="this.src='images/placeholder.jpg'">
                        <div class="item-details">
                            <h3>${item.name}</h3>
                            <p class="price">Rs. ${item.price}/kg</p>
                        </div>
                        <div class="quantity-controls">
                            <button onclick="updateQuantity('${item.productId}', -1)">-</button>
                            <span>${item.quantity} kg</span>
                            <button onclick="updateQuantity('${item.productId}', 1)">+</button>
                        </div>
                        <div class="item-total">
                            Rs. ${itemTotal.toFixed(2)}
                        </div>
                        <button onclick="removeFromCart('${item.productId}')" class="btn-secondary">Remove</button>
                    </div>
                `;
            }).join('');

            totalItemsEl.textContent = totalItems;
            totalAmountEl.textContent = totalAmount.toFixed(2);
            placeOrderBtn.disabled = false;
        }

        // Update quantity
        function updateQuantity(productId, change) {
            const item = cart.find(item => item.productId === productId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    localStorage.setItem('buyerCart', JSON.stringify(cart));
                    displayCart();
                }
            }
        }

        // Remove from cart
        function removeFromCart(productId) {
            cart = cart.filter(item => item.productId !== productId);
            localStorage.setItem('buyerCart', JSON.stringify(cart));
            displayCart();
        }

        // Place order - COMPLETE FIXED VERSION
        async function placeOrder() {
            const user = auth.currentUser;
            if (!user) {
                alert('Please login to place an order');
                window.location.href = 'buyer-login.html';
                return;
            }

            if (cart.length === 0) {
                alert('Your cart is empty');
                return;
            }

            try {
                const placeOrderBtn = document.getElementById('placeOrderBtn');
                placeOrderBtn.textContent = 'Placing Order...';
                placeOrderBtn.disabled = true;

                // Calculate total amount
                const totalAmount = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                
                // Get buyer name
                const buyerName = await getBuyerName(user.uid);
                
                // Create order data WITH PROPER FIELDS
                const orderData = {
                    buyerId: user.uid,
                    buyerName: buyerName,
                    buyerEmail: user.email,
                    items: cart.map(item => ({
                        productId: item.productId,
                        name: item.name,
                        price: item.price,
                        quantity: item.quantity,
                        farmerId: item.farmerId,
                        unit: 'kg'
                    })),
                    totalAmount: totalAmount,
                    status: 'pending',
                    paymentStatus: 'pending',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(), // Use server timestamp
                    orderDate: new Date().toISOString(),
                    orderId: 'ORD' + Date.now().toString().slice(-8),
                    // Add farmer-specific fields for easy querying
                    farmerIds: [...new Set(cart.map(item => item.farmerId))] // Unique farmer IDs
                };

                console.log('Placing order:', orderData);

                // Add order to Firestore
                await db.collection('orders').add(orderData);

                // Clear cart and show success message
                localStorage.removeItem('buyerCart');
                cart = [];
                
                alert('Order placed successfully!');
                window.location.href = 'order-history.html';

            } catch (error) {
                console.error("Error placing order:", error);
                alert('Error placing order: ' + error.message);
                
                // Reset button
                const placeOrderBtn = document.getElementById('placeOrderBtn');
                placeOrderBtn.textContent = 'Place Order';
                placeOrderBtn.disabled = false;
            }
        }

        // Helper function to get buyer name
        async function getBuyerName(userId) {
            try {
                const userDoc = await db.collection('users').doc(userId).get();
                if (userDoc.exists) {
                    const userData = userDoc.data();
                    return userData.fullName || userData.name || 'Customer';
                }
                return 'Customer';
            } catch (error) {
                console.error('Error getting buyer name:', error);
                return 'Customer';
            }
        }

        // Make functions global
        window.updateQuantity = updateQuantity;
        window.removeFromCart = removeFromCart;
        window.placeOrder = placeOrder;

        // Initialize cart display
        document.addEventListener('DOMContentLoaded', function() {
            displayCart();
        });
    </script>
</body>
</html>
